version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: oux-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-oux}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server-ai:
    build:
      context: ./server-ai
      dockerfile: Dockerfile
    container_name: oux-server-ai
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-LOCAL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  server-core:
    build:
      context: ./server-core
      dockerfile: Dockerfile
    container_name: oux-server-core
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-oux}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - AI_SERVICE_URL=http://server-ai:8000
    depends_on:
      postgres:
        condition: service_healthy
      server-ai:
        condition: service_started
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: oux-client
    ports:
      - "5173:80"
    depends_on:
      - server-core
    restart: unless-stopped

volumes:
  postgres_data:
